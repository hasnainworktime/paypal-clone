<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; background: #f5f7fa; margin: 0; }
    .header { background: #0070ba; color: white; padding: 15px; }
    .container { padding: 20px; }
    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input { padding: 10px; margin: 5px 0; width: 100%; }
    button { padding: 10px; background: #0070ba; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <span id="userEmail"></span>
  <button onclick="logout()" style="float:right;background:red;">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h3>Balance</h3>
    <h2 id="balance"></h2>
  </div>

  <div class="card">
    <h3>Send Money</h3>
    <input type="text" id="receiver" placeholder="Receiver Email">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="sendMoney()">Send</button>
  </div>

  <div class="card">
    <h3>Transactions</h3>
    <div id="history"></div>
  </div>

</div>

<script>

let currentEmail = localStorage.getItem("currentUser");

if(!currentEmail){
  window.location.href = "index.html";
}

document.getElementById("userEmail").innerText = currentEmail;

function getUsers() {
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function loadBalance() {
  let users = getUsers();
  let user = users.find(u => u.email === currentEmail);
  document.getElementById("balance").innerText = "$" + user.balance;
}

function loadHistory() {
  let users = getUsers();
  let user = users.find(u => u.email === currentEmail);

  if(user.transactions.length === 0) {
    document.getElementById("history").innerHTML = "No transactions yet";
  } else {
    document.getElementById("history").innerHTML =
      user.transactions.join("<br>");
  }
}

function sendMoney() {

  let receiverEmail = document.getElementById("receiver").value;
  let amount = parseInt(document.getElementById("amount").value);

  if(receiverEmail === "" || amount <= 0) {
    alert("Enter valid details");
    return;
  }

  let users = getUsers();
  let sender = users.find(u => u.email === currentEmail);
  let receiver = users.find(u => u.email === receiverEmail);

  if(!receiver) {
    alert("Receiver not found");
    return;
  }

  if(sender.balance < amount) {
    alert("Insufficient balance");
    return;
  }

  sender.balance -= amount;
  receiver.balance += amount;

  sender.transactions.push("Sent $" + amount + " to " + receiverEmail);
  receiver.transactions.push("Received $" + amount + " from " + currentEmail);

  saveUsers(users);

  loadBalance();
  loadHistory();
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

loadBalance();
loadHistory();

</script>

</body>
</html>
