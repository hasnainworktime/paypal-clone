<!DOCTYPE html>
<html>
<head>
  <title>PayPal Clone - Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      border-radius: 8px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0070ba;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>PayPal Login</h2>
    <input type="text" id="email" placeholder="Enter email">
    <button onclick="login()">Login</button>
  </div>

<script>
  function login() {
    let email = document.getElementById("email").value;

    if(email === "") {
      alert("Enter email");
      return;
    }

    localStorage.setItem("userEmail", email);

    // First time user? Give starting balance
    if(!localStorage.getItem("balance")) {
      localStorage.setItem("balance", 1000);
    }

    window.location.href = "dashboard.html";
  }
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
  <title>PayPal Clone - Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 30px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0070ba;
      color: white;
      border: none;
      cursor: pointer;
    }
    .link {
      margin-top: 10px;
      color: blue;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title">Login</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="submitForm()">Submit</button>

  <div class="link" onclick="toggleMode()" id="toggleText">
    Don't have account? Signup
  </div>
</div>

<script>

let isSignup = false;

function toggleMode() {
  isSignup = !isSignup;
  document.getElementById("title").innerText = isSignup ? "Signup" : "Login";
  document.getElementById("toggleText").innerText =
    isSignup ? "Already have account? Login" : "Don't have account? Signup";
}

function submitForm() {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email === "" || password === "") {
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(isSignup) {

    let userExists = users.find(u => u.email === email);
    if(userExists) {
      alert("User already exists");
      return;
    }

    users.push({
      email: email,
      password: password,
      balance: 1000,
      transactions: []
    });

    localStorage.setItem("users", JSON.stringify(users));
    alert("Signup successful");

  } else {

    let user = users.find(u => u.email === email && u.password === password);

    if(!user) {
      alert("Invalid credentials");
      return;
    }

    localStorage.setItem("currentUser", email);
    window.location.href = "dashboard.html";
  }
}

</script>

</body>
</html>
